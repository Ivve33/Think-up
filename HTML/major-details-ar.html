<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse available majors within a college on Think-Up." />
  <title>Majors | Think-Up</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/major-details.css" />
  <link rel="stylesheet" href="../CSS/rtl.css" />
  <link rel="stylesheet" href="../CSS/navbar.css" />
</head>
<body>
  <a class="language-switch" data-lang-switch="true" href="major-details.html" lang="en" dir="ltr">English</a>

  <!-- Navbar -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="homePage-ar.html" class="logo" aria-label="Think-Up home">Think-<span>Up</span></a>
      <nav aria-label="Main navigation">
        <a id="backBtn" href="#" class="btn-solid">&larr; Back to University</a>
      </nav>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero-dark">
    <div class="container text-center">

      <div class="college-brand-box">
        <div id="collegeIcon" class="college-icon-inner" aria-hidden="true">🎓</div>
      </div>

      <div class="badge">Select Your Major</div>
      <h1 id="collegeName">Loading...</h1>
      <p id="uniNameSub" class="location">...</p>

      <div class="search-container">
        <label for="searchMajorsInput" class="visually-hidden">Search majors</label>
        <input type="text" id="searchMajorsInput" class="search-input" placeholder="Search majors..." />
        <span class="search-icon" aria-hidden="true">🔍</span>
      </div>

    </div>
  </section>

  <!-- Main Content -->
  <main class="container main-grid-wrap">

    <div class="section-header">
      <h2>Choose Your Specialization</h2>
      <p>Select a major to explore its full curriculum.</p>
    </div>

    <div id="majorsGrid" class="majors-grid">
      <div class="loader">
        <div class="spinner" aria-hidden="true"></div>
        <span>Loading majors...</span>
      </div>
    </div>

  </main>

  <footer class="footer">
    <p>&copy; 2026 Think-Up. Proudly serving Saudi students.</p>
  </footer>

  <script type="module" src="../JS/major-details.js"></script>
  <script type="module" src="../JS/navbar.js"></script>
  <script src="../JS/i18n-ar.js"></script>
</body>
</html>
