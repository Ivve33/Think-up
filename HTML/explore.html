<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Explore Saudi universities and find your major, courses, and study sessions on Think-Up." />
  <title>Think-Up | Explore Universities</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/explore.css" />
  <link rel="stylesheet" href="../CSS/rtl.css" />
  <link rel="stylesheet" href="../CSS/navbar.css" />
</head>
<body>
  <a class="language-switch" data-lang-switch="true" href="#" lang="ar" dir="rtl">العربية</a>

  <header class="navbar">
    <div class="container nav-container">
      <a href="homePage.html" class="logo" aria-label="Think-Up home">Think-<span>Up</span></a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="homePage.html" class="nav-link">Home</a>
        <a id="dynamicBackBtn" href="homePage.html" class="btn-solid">Back to Home</a>
      </nav>
    </div>
  </header>

  <section class="hero-dark">
    <div class="container text-center">
      <div class="badge">Select Your Path</div>
      <h1>Explore <span>Universities</span></h1>
      <p>Search through our network of Saudi universities and colleges.</p>

      <div class="search-container">
        <label for="searchInput" class="visually-hidden">Search universities</label>
        <input type="text" id="searchInput" class="search-input" placeholder="Search for university (e.g. Jeddah)..." />
        <span class="search-icon" aria-hidden="true">🔍</span>
      </div>
    </div>
  </section>

  <main class="container main-grid-wrap">
    <div class="uni-grid" id="universitiesGrid">
      <div class="loader">
        <div class="spinner" aria-hidden="true"></div>
        <span>Finding universities...</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Think-Up. Proudly serving Saudi students.</p>
  </footer>

  <script type="module" src="../JS/explore.js"></script>
  <script type="module" src="../JS/navbar.js"></script>
  <script src="../JS/lang-toggle.js"></script>
</body>
</html>
