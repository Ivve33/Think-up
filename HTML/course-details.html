<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse the full curriculum of a major by level, with elective and free elective options." />
  <title>Think-Up | Course Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/course-details.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="container nav-container">
      <a href="homePage.html" class="logo" aria-label="Think-Up home">Think-<span>Up</span></a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="homePage.html" class="nav-link">Home</a>
        <a id="backBtn" href="major-details.html" class="btn-solid">&larr; Back</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-dark">
    <div class="container text-center">
      <div class="badge" id="majorBadge">Software Engineering</div>
      <h1>Explore <span id="heroTitle">Courses</span></h1>
      <p id="heroSub">Browse all courses in your study plan by level.</p>

      <div class="search-container">
        <label for="searchInput" class="visually-hidden">Search courses</label>
        <input type="text" id="searchInput" class="search-input" placeholder="Search for a course..." />
        <span class="search-icon" aria-hidden="true">🔍</span>
      </div>

      <!-- Quick Jump -->
      <div class="quick-jump" id="quickJump" aria-label="Quick jump to levels">
        <!-- built dynamically by JS -->
      </div>
    </div>
  </section>

  <!-- MAIN CONTENT -->
  <main class="container main-content">

    <!-- Levels Sections -->
    <div id="levelsContainer">
      <div class="loader">
        <div class="spinner" aria-hidden="true"></div>
        <span>Loading courses...</span>
      </div>
    </div>

    <!-- Electives Section -->
    <section class="electives-section is-hidden" id="electivesSection">
      <div class="section-header">
        <h2 class="section-title">⚡ Major Electives</h2>
        <p class="section-sub">Choose from the following elective courses to complete your study plan.</p>
      </div>
      <div class="courses-grid" id="electivesGrid"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>&copy; 2026 Think-Up. Proudly serving Saudi students.</p>
  </footer>

  <script type="module" src="../JS/course-details.js"></script>

</body>
</html>
